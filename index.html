<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <title>bot-trade</title>
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0c1c" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <!-- W3.CSS moved into src/index.css under a low-priority cascade layer.
         As a plain <link> here it was UNLAYERED css, which beats every
         layered Tailwind v4 utility regardless of specificity — its
         normalize (aside/nav/header{display:block}, h1-h6 sizes) broke the
         whole mobile layout. Do not re-add it as a <link>. -->
    <!-- GSAP (CDN) + ScrollTrigger — animation layer. Pages guard on
         window.gsap so a blocked CDN degrades to a static (still fully
         functional) UI rather than breaking anything. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
  </head>
  <body>
    <a href="#main-content" class="skip-nav">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
