<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- bot-trade line-art icon: stroke-only ring, candles, 61.8% fib dash.
       Blue #2563eb (up) / red #dc2626 (down) / violet #a855f7 accents. -->
  <circle cx="256" cy="256" r="216" stroke="#2563eb" stroke-width="18"/>
  <!-- candles (outline only) -->
  <g stroke-width="12" stroke-linecap="round">
    <!-- up candle 1 -->
    <line x1="150" y1="272" x2="150" y2="296" stroke="#2563eb"/>
    <line x1="150" y1="384" x2="150" y2="404" stroke="#2563eb"/>
    <rect x="126" y="296" width="48" height="88" rx="10" stroke="#2563eb"/>
    <!-- up candle 2 -->
    <line x1="222" y1="180" x2="222" y2="204" stroke="#2563eb"/>
    <line x1="222" y1="312" x2="222" y2="334" stroke="#2563eb"/>
    <rect x="198" y="204" width="48" height="108" rx="10" stroke="#2563eb"/>
    <!-- retracement candle (down, red) -->
    <line x1="294" y1="206" x2="294" y2="228" stroke="#dc2626"/>
    <line x1="294" y1="330" x2="294" y2="352" stroke="#dc2626"/>
    <rect x="270" y="228" width="48" height="102" rx="10" stroke="#dc2626"/>
    <!-- resume candle (up) -->
    <line x1="366" y1="128" x2="366" y2="152" stroke="#2563eb"/>
    <line x1="366" y1="296" x2="366" y2="318" stroke="#2563eb"/>
    <rect x="342" y="152" width="48" height="144" rx="10" stroke="#2563eb"/>
  </g>
  <!-- 61.8% fib dashed level -->
  <line x1="104" y1="290" x2="408" y2="290" stroke="#a855f7" stroke-width="10" stroke-linecap="round" stroke-dasharray="22 18"/>
</svg>
